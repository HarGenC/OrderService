infrastructure:
  db:
    dsn: postgresql+asyncpg://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE_NAME}
    pool_size: 15
    pool_recycle: 1800
  clients:
    catalog_service:
      api_key: ${X_API_KEY}
      base_url: ${CATALOG_SERVICE_BASE_URL}
